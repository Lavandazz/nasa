{% load static %}

{% block media-content %}

    <section id="media" class="media">

        <div class="container justify-content-center">
        <h1 class="media-title">Фотографии</h1>
            <div class="slider-for">
                {% for slide in slides %}
                    <div>
                        <a href="{{ slide.image.url }}" data-lightbox="gallery" data-title="{{ slide.title }}">
                            <img src="{{ slide.image.url }}" class="img-fluid" alt="{{ slide.title }}">
                        </a>
                    </div>
                {% empty %}
                    <p>Нет изображений</p>
                {% endfor %}
            </div>
        
            <div class="slider-nav mt-3">
                {% for slide in slides %}
                    <div>
                        <img src="{{ slide.image.url }}" class="img-fluid" alt="{{ slide.title }}">
                    </div>
                {% endfor %}
            </div>
        </div>


    </section>
{% endblock %}
